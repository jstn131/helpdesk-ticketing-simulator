<!DOCTYPE html>
<html>
<head>
    <title>Edit Ticket #{{ ticket.id }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">HD</div>
            <div>
                <div class="brand-name">HelpDesk</div>
                <div class="brand-sub">// ticketing</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a href="/" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="/tickets" class="nav-link active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                All Tickets
            </a>
            <a href="/tickets/new" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                New Ticket
            </a>
        </nav>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <div class="ticket-id">TICKET-{{ ticket.id }}</div>
                <h1 class="page-title">{{ ticket.title }}</h1>
                <p class="page-subtitle">Update ticket status, priority, or assignment</p>
            </div>
        </div>

        <div class="form-card">
            <form action="/tickets/{{ ticket.id }}/edit" method="POST">
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="Open"        {{ 'selected' if ticket.status == 'Open' }}>Open</option>
                        <option value="In Progress" {{ 'selected' if ticket.status == 'In Progress' }}>In Progress</option>
                        <option value="Resolved"    {{ 'selected' if ticket.status == 'Resolved' }}>Resolved</option>
                        <option value="Closed"      {{ 'selected' if ticket.status == 'Closed' }}>Closed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="Low"      {{ 'selected' if ticket.priority == 'Low' }}>Low</option>
                        <option value="Medium"   {{ 'selected' if ticket.priority == 'Medium' }}>Medium</option>
                        <option value="High"     {{ 'selected' if ticket.priority == 'High' }}>High</option>
                        <option value="Critical" {{ 'selected' if ticket.priority == 'Critical' }}>Critical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Assign To</label>
                    <select name="assigned_to" class="form-select">
                        <option value="Unassigned" {{ 'selected' if ticket.assigned_to == 'Unassigned' }}>Unassigned</option>
                        <option value="Agent 1"    {{ 'selected' if ticket.assigned_to == 'Agent 1' }}>Agent 1</option>
                        <option value="Agent 2"    {{ 'selected' if ticket.assigned_to == 'Agent 2' }}>Agent 2</option>
                        <option value="Agent 3"    {{ 'selected' if ticket.assigned_to == 'Agent 3' }}>Agent 3</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/tickets/{{ ticket.id }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
